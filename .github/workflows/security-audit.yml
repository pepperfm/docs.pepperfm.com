name: Security Audit

on:
  pull_request:
  push:
    branches: [master]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FAIL_ON_HIGH: 'false'

jobs:
  audit:
    name: bun audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run dependency audit
        id: run_audit
        shell: bash
        run: |
          set +e
          bun audit > audit-report.txt 2>&1
          AUDIT_EXIT=$?
          set -e

          SUMMARY_LINE=$(grep -E '[0-9]+ vulnerabilities \([0-9]+ high, [0-9]+ moderate, [0-9]+ low\)' audit-report.txt | tail -n 1 || true)
          if [[ -z "$SUMMARY_LINE" ]]; then
            SUMMARY_LINE="0 vulnerabilities (0 high, 0 moderate, 0 low)"
          fi

          HIGH=$(echo "$SUMMARY_LINE" | sed -E 's/.*\(([0-9]+) high, ([0-9]+) moderate, ([0-9]+) low\).*/\1/')
          MODERATE=$(echo "$SUMMARY_LINE" | sed -E 's/.*\(([0-9]+) high, ([0-9]+) moderate, ([0-9]+) low\).*/\2/')
          LOW=$(echo "$SUMMARY_LINE" | sed -E 's/.*\(([0-9]+) high, ([0-9]+) moderate, ([0-9]+) low\).*/\3/')

          echo "audit_exit=${AUDIT_EXIT}" >> "${GITHUB_OUTPUT}"
          echo "summary=${SUMMARY_LINE}" >> "${GITHUB_OUTPUT}"
          echo "high=${HIGH}" >> "${GITHUB_OUTPUT}"
          echo "moderate=${MODERATE}" >> "${GITHUB_OUTPUT}"
          echo "low=${LOW}" >> "${GITHUB_OUTPUT}"

          echo "## Dependency Audit Summary" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "- ${SUMMARY_LINE}" >> "${GITHUB_STEP_SUMMARY}"
          echo "- bun audit exit code: ${AUDIT_EXIT}" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "_Policy_: FAIL_ON_HIGH=${FAIL_ON_HIGH}" >> "${GITHUB_STEP_SUMMARY}"

          if [[ "${HIGH}" -gt 0 ]]; then
            echo "::warning::High vulnerabilities detected (${HIGH}). See artifact audit-report.txt."
          fi

          if [[ "${FAIL_ON_HIGH}" == "true" && "${HIGH}" -gt 0 ]]; then
            echo "::error::Failing workflow due to HIGH vulnerabilities and FAIL_ON_HIGH=true."
            exit 1
          fi

          exit 0

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: bun-audit-report
          path: audit-report.txt
          if-no-files-found: error
